# Large Setting: 90C-6G-4B-2FFNExpansion
network_g:
  type: CGSF
  upscale: 3
  in_chans: 3
  dim: 48
  groups: 3
  blocks: 3
  buildblock_type: Wave
  window_size: 7
  idynamic_num_heads: 6
  idynamic_ffn_type: GDFN
     idynamic_ffn_expansion_factor: 2.0
  restormer_num_heads: 8
  restormer_ffn_type: GDFN
  restormer_ffn_expansion_factor: 2.0
  tlc_flag: True
  tlc_kernel: 48

  body_norm: False
  img_range: 1.0
  upsampler: pixelshuffledirect

# path
path:
  pretrain_network_g:
  strict_load_g: true
  resume_state: ~
  param_key_g: 'params_ema'

# validation settings
val:
  save_img: true
  suffix: ~  # add suffix to saved images, if None, use exp name

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: true

# dist training settings
dist_params:
  backend: nccl
  port: 22144
